name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Consumer smoke (packed imports)
        run: pnpm consumer:smoke

  e2e-playwright:
    name: Playwright E2E (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm e2e:install

      - name: Run Playwright E2E
        run: pnpm e2e:test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: warn
          retention-days: 14

  governance:
    name: Validate branch name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^(docs|spec|feature|feat|fix|test|chore|ci|build|refactor|codex)/[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Branch name '$BRANCH_NAME' must match <type>/<kebab-topic>."
            echo "Allowed types: docs, spec, feature, feat, fix, test, chore, ci, build, refactor, codex."
            echo "Prefer feature/ for new capabilities; feat/ is accepted as a Conventional Commits alias."
            exit 1
          fi

  conventions:
    name: Validate PR title and commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli@19.8.1 @commitlint/config-conventional@19.8.1

      - name: Validate commit messages
        run: npx commitlint --config .commitlintrc.cjs --from "$BASE_SHA" --to "$HEAD_SHA" --verbose
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Validate PR title
        run: printf '%s\n' "$PR_TITLE" | npx commitlint --config .commitlintrc.cjs --verbose
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
