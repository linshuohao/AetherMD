name: Branch governance

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  branch-name:
    name: Validate branch name
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate head branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH_NAME" =~ ^(docs|spec|feature|fix|test|chore|ci|build|refactor|codex)/[a-z0-9]+(-[a-z0-9]+)*$ ]]; then
            echo "Branch name '$BRANCH_NAME' must match <type>/<kebab-topic>."
            echo "Allowed types: docs, spec, feature, fix, test, chore, ci, build, refactor, codex."
            exit 1
          fi

  direct-push-audit:
    name: Audit main push source
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Require an associated pull request
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const commit_sha = context.sha;
            const { data: pulls } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha,
              });

            if (pulls.length === 0) {
              core.setFailed(
                `Commit ${commit_sha} reached main without an associated pull request. ` +
                  `Enable a GitHub Ruleset requiring pull requests before merging to block this before push.`
              );
            }
